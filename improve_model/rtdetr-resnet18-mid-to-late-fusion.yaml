# RT-DETR-ResNet50 object detection model with P3-P5 outputs.

# Parameters
nc: 80 # number of classes
scales: # model compound scaling constants, i.e. 'model=yolov8n-cls.yaml' will call yolov8-cls.yaml with scale 'n'
  # [depth, width, max_channels]
  l: [1.00, 1.00, 1024]
 
backbone:
  # [from, repeats, module, args]
  - [-1, 1, IN, []]

  - [0, 1, ConvNormLayer, [32, 3, 2, 1, 'relu']] # 1-P1
  - [-1, 1, ConvNormLayer, [32, 3, 1, 1, 'relu']] # 2
  - [-1, 1, ConvNormLayer, [64, 3, 1, 1, 'relu']] # 3
  - [-1, 1, nn.MaxPool2d, [3, 2, 1]] # 4-P2
 
 
  - [-1, 2, Blocks, [64,  BasicBlock, 2, False]] # 5
  - [-1, 2, Blocks, [128, BasicBlock, 3, False]] # 6-P3
  - [-1, 2, Blocks, [256, BasicBlock, 4, False]] # 7-P4
  - [-1, 2, Blocks, [512, BasicBlock, 5, False]] # 8-P5

  - [0, 1, ConvNormLayer, [32, 3, 2, 1, 'relu']] # 9-P1
  - [-1, 1, ConvNormLayer, [32, 3, 1, 1, 'relu']] # 10
  - [-1, 1, ConvNormLayer, [64, 3, 1, 1, 'relu']] # 11
  - [-1, 1, nn.MaxPool2d, [3, 2, 1]] # 12-P2
 
 
  - [-1, 2, Blocks, [64,  BasicBlock, 2, False]] # 13
  - [-1, 2, Blocks, [128, BasicBlock, 3, False]] # 14-P3
  - [-1, 2, Blocks, [256, BasicBlock, 4, False]] # 15-P4
  - [-1, 2, Blocks, [512, BasicBlock, 5, False]] # 16-P5

head:
  - [8, 1, Conv, [256, 1, 1, None, 1, 1, False]]  # 17 input_proj.2
  - [-1, 1, AIFI, [1024, 8]]
  - [-1, 1, Conv, [256, 1, 1]]  # 19, Y5, lateral_convs.0
 
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] # 20
  - [7, 1, Conv, [256, 1, 1, None, 1, 1, False]]  # 21 input_proj.1
  - [[-2, -1], 1, Concat, [1]]
  - [-1, 3, RepC3, [256, 0.5]]  # 23, fpn_blocks.0
  - [-1, 1, Conv, [256, 1, 1]]  # 24, Y4, lateral_convs.1
 
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] # 25
  - [6, 1, Conv, [256, 1, 1, None, 1, 1, False]]  # 26 input_proj.0
  - [[-2, -1], 1, Concat, [1]]  # 27 cat backbone P4
  - [-1, 3, RepC3, [256, 0.5]]  # X3 (28), fpn_blocks.1

  - [16, 1, Conv, [256, 1, 1, None, 1, 1, False]]  # 29 input_proj.2
  - [-1, 1, AIFI, [1024, 8]]
  - [-1, 1, Conv, [256, 1, 1]]  # 31, Y5, lateral_convs.0
 
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] # 32
  - [15, 1, Conv, [256, 1, 1, None, 1, 1, False]]  # 33 input_proj.1
  - [[-2, -1], 1, Concat, [1]]
  - [-1, 3, RepC3, [256, 0.5]]  # 35, fpn_blocks.0
  - [-1, 1, Conv, [256, 1, 1]]  # 36, Y4, lateral_convs.1
 
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] # 37
  - [14, 1, Conv, [256, 1, 1, None, 1, 1, False]]  # 38 input_proj.0
  - [[-2, -1], 1, Concat, [1]]  # 39 cat backbone P4
  - [-1, 3, RepC3, [256, 0.5]]  # X3 (40), fpn_blocks.1


  - [[19, 31], 1, Concat, [1]]  # 41 cat backbone P3
  - [[24, 36], 1, Concat, [1]]  # 42 cat backbone P4
  - [[28, 40], 1, Concat, [1]]  # 43 cat backbone P5

  - [-1, 1, Conv, [256, 3, 2]]  # 44, downsample_convs.0
  - [[-1, 42], 1, Concat, [1]]  # 45 cat Y4
  - [-1, 3, RepC3, [256, 0.5]]  # F4 (46), pan_blocks.0
 
  - [-1, 1, Conv, [256, 3, 2]]  # 47, downsample_convs.1
  - [[-1, 41], 1, Concat, [1]]  # 48 cat Y5
  - [-1, 3, RepC3, [256, 0.5]]  # F5 (49), pan_blocks.1
 
  - [[43, 46, 49], 1, RTDETRDecoder, [nc, 256, 300, 4, 8, 3]]  # Detect(P3, P4, P5)


